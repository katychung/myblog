<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Katy Chung / UX Designer / Tokyo / {{ page.title }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@1,144,900&family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ "assets/vendor/bootstrap/css/bootstrap.min.css" | relative_url }}">
  <link rel="stylesheet" href="{{ "assets/css/katy.css" | relative_url }}">
  <link rel="icon" href="assets/img/favicon.ico" type="image/x-icon">
  <script src="https://kit.fontawesome.com/971eb46c9b.js" crossorigin="anonymous"></script>
  {% if site.url != "http://localhost:4000" %}
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-6JN6LW9SD9"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-6JN6LW9SD9');
  </script>
  {% endif %}
</head>
<body>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
  <script src="/assets/js/bootstrap.min.js"></script>
  {% include navigation.html %}

  <div class="site-layout">
    {% include sidebar.html %}
    <main class="main-content">
      <div class="container">
        {{ content }}
      </div>
      {% include footer.html %}
    </main>
  </div>

  <script src="https://unpkg.com/@rive-app/canvas"></script>
  <script>
    window.addEventListener("DOMContentLoaded", () => {
      document.querySelectorAll(".rive-canvas").forEach(canvas => {
        new rive.Rive({
          src: canvas.dataset.rive,
          canvas: canvas,
          autoplay: true,
          stateMachines: [canvas.dataset.machine],
          devicePixelRatio: window.devicePixelRatio || 1,
        });
      });
    });
  </script>
</body>
</html>
