---
layout: default
title: "Home"
---

<style>
.fd   { font-family: 'Fraunces', serif; font-weight: 900; font-style: italic; font-variation-settings: 'opsz' 144, 'WONK' 0; }
.mono { font-family: 'Courier New', Courier, monospace; }
.prompt::before { content: '❯ '; opacity: 0.28; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
.cur::after { content: '█'; animation: blink 1s step-end infinite; }

@keyframes holo-shift {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
.g-name {
  transition: all 0.4s ease;
  padding-bottom: 0.15em;
}
.g-name:hover {
  background: linear-gradient(
    120deg,
    #d4b8f0, #a8d8f5, #b8f0e0, #f5d0e8, #c8b8f0, #a8d8f5, #d4b8f0
  );
  background-size: 300% 300%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: holo-shift 3s ease infinite;
}

.home-g      { padding: 3rem 0; }
.g-greeting  { font-size: 0.82rem; margin-bottom: 0.4rem; }
.g-greeting span:not(.wave-emoji) { opacity: 0.4; }
.g-name      { font-size: 3.5rem; line-height: 1; margin-bottom: 0.6rem; }
.g-rule      { border: none; border-top: 1px solid currentColor; opacity: 0.12; margin: 0 0 0.6rem; }
.g-term      { font-size: 0.9rem; line-height: 1.8; }

.g-term a {
  color: inherit;
  background: none !important;
  text-decoration: underline;
  text-decoration-style: dotted;
  text-underline-offset: 3px;
  text-decoration-thickness: 1px;
  padding: 0;
}
.g-term a:hover { opacity: 0.6; color: inherit !important; text-shadow: none !important; background: none !important; cursor: pointer; }
</style>

<div class="home-g">
  <div class="mono g-greeting"><span>❯ こんにちは</span> <span class="wave-emoji">👋🏼</span></div>
  <div class="fd g-name">Katy</div>
  <hr class="g-rule">
  <div class="g-term mono">
    <div class="prompt"><a href="projects.html">Design</a>, <a href="photos.html">photography</a>, <a href="#" class="highlight4" data-image="assets/img/site/personal-bicycle.jpg">bicycle</a>, jump rope, eyewear</div>
    <div class="prompt">UX Designer · Tokyo · Retail Tech</div>
    <div class="prompt" style="opacity:0.42;">Goodpatch · Oracle · Vyond<span class="cur"></span></div>
  </div>
</div>

<img id="hoverImage" class="hover-image" src="" alt="Image Preview">

<script>
document.addEventListener('DOMContentLoaded', function () {
  const hoverImage = document.getElementById('hoverImage');
  document.querySelectorAll('.highlight4').forEach(link => {
    link.addEventListener('mouseover', () => { hoverImage.src = link.getAttribute('data-image'); hoverImage.style.display = 'block'; });
    link.addEventListener('mousemove', e => { hoverImage.style.left = e.pageX + 10 + 'px'; hoverImage.style.top = e.pageY + 10 + 'px'; });
    link.addEventListener('mouseout', () => { hoverImage.style.display = 'none'; });
  });
});
</script>
