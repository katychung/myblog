
<script>
  (function() {
    var saved = localStorage.getItem('darkMode');
    if (saved === 'enabled') {
      document.body.classList.add('dark-mode');
    }
  })();
</script>

<script>
  function toggleDarkMode() {
    var isDark = document.body.classList.toggle('dark-mode');
    localStorage.setItem('darkMode', isDark ? 'enabled' : 'disabled');
    if (typeof gtag !== 'undefined') {
      gtag('event', 'dark_mode_toggle', {
        event_category: 'ui',
        event_label: isDark ? 'dark' : 'light'
      });
    }
  }

  function toggleSidebar() {
    document.querySelector('.sidebar').classList.toggle('open');
  }

  document.addEventListener('DOMContentLoaded', function () {
    // Close mobile menu when a nav link is clicked
    document.querySelectorAll('.sidebar-link').forEach(function(link) {
      link.addEventListener('click', function() {
        document.querySelector('.sidebar').classList.remove('open');
      });
    });

    document.querySelectorAll('.card, .tilt-item').forEach(function (el) {
      el.addEventListener('mouseenter', function () {
        el.style.transition = 'box-shadow 0.4s ease';
      });
      el.addEventListener('mousemove', function (e) {
        var rect = el.getBoundingClientRect();
        var x = e.clientX - rect.left;
        var y = e.clientY - rect.top;
        var cx = rect.width / 2;
        var cy = rect.height / 2;
        var rotX = ((y - cy) / cy) * -3;
        var rotY = ((x - cx) / cx) *  3;
        el.style.transform = 'perspective(700px) rotateX(' + rotX + 'deg) rotateY(' + rotY + 'deg) translateZ(4px)';
      });
      el.addEventListener('mouseleave', function () {
        el.style.transition = 'transform 0.5s ease, box-shadow 0.4s ease';
        el.style.transform = 'perspective(700px) rotateX(0deg) rotateY(0deg) translateZ(0px)';
      });
    });
  });
</script>
