---
layout: default
title: "Contact"
---
<div class="row pt-5 mt-4 pb-3">
  <h1 class="page-label">Contact</h1>
</div>

<div class="row pb-5">
  <div class="col-12 col-md-8">
    <p>Always happy to connect.</p>
    <form id="contact-form" action="https://formspree.io/f/mdaljenp" method="POST">
      <div class="mb-4">
        <div class="contact-reasons">
          <input type="radio" class="contact-reason-input" name="reason" id="reason-coffee" value="Coffee chat">
          <label class="contact-reason-label" for="reason-coffee">Coffee chat</label>
          <input type="radio" class="contact-reason-input" name="reason" id="reason-opportunity" value="Opportunity">
          <label class="contact-reason-label" for="reason-opportunity">Opportunity</label>
          <input type="radio" class="contact-reason-input" name="reason" id="reason-password" value="Portfolio access">
          <label class="contact-reason-label" for="reason-password">Portfolio access</label>
          <input type="radio" class="contact-reason-input" name="reason" id="reason-other" value="Other">
          <label class="contact-reason-label" for="reason-other">Other</label>
        </div>
      </div>
      <div class="mb-3">
        <input type="text" class="form-control contact-input" name="name" placeholder="Name" required>
      </div>
      <div class="mb-3">
        <input type="email" class="form-control contact-input" name="email" placeholder="Email" required>
      </div>
      <div class="mb-3">
        <textarea class="form-control contact-input" name="message" rows="5" placeholder="Message" required></textarea>
      </div>
      <button type="submit" class="btn contact-btn">Send</button>
      <p class="contact-success mt-3" style="display:none;">Thanks — I'll be in touch!</p>
    </form>
  </div>
</div>

<script>
  var form = document.getElementById('contact-form');
  form.addEventListener('submit', function(e) {
    e.preventDefault();
    fetch(form.action, {
      method: 'POST',
      body: new FormData(form),
      headers: { 'Accept': 'application/json' }
    }).then(function(r) {
      if (r.ok) {
        form.reset();
        form.querySelector('.contact-success').style.display = 'block';
        form.querySelector('.contact-btn').style.display = 'none';
        if (typeof gtag !== 'undefined') gtag('event', 'form_submit', { event_category: 'contact' });
      }
    });
  });
</script>
